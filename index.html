<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum da Copa Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>🏆 Meu Álbum da Copa Virtual 🏆</h1>
        <p class="subtitle">Colecione, troque e complete o álbum de 1000 figurinhas!</p>
    </header>
    
    <div class="placar-container">
        <div class="placar" id="placar-progresso">Coladas: 0 / 1000 (0%)</div>
        <div class="placar" id="placar-envelopes">✉️ Envelopes: 5</div>
        <div class="placar" id="placar-pontos">🪙 Pontos: 100</div>
    </div>
    
    <div class="recompensa-container">
        <button class="diario-btn" id="btn-diario">Coletar Envelopes Diários 🎁</button>
    </div>
    
    <div class="botoes-container">
        <button class="pacote-btn" id="btn-abrir">Abrir Envelope (8 Figurinhas)</button>
        <button class="loja-btn" id="btn-comprar">Comprar Envelope (-25 🪙)</button>
        <button class="reset-btn" id="btn-reset">Resetar Álbum 🔄</button>
    </div>

    <div class="container-figurinhas" id="pacote-aberto"></div>

    <div class="secao-album">
        <h2>📖 Livro Ilustrado Oficial</h2>
        <div class="titulo-selecao-ativa" id="nome-selecao-ativa">Carregando...</div>
        
        <div class="controle-paginacao">
            <label for="select-pagina">Ir para a página: </label>
            <select class="seletor-pagina" id="select-pagina">
                </select>
        </div>

        <div class="grade-album" id="grade-album"></div>
    </div>

    <div class="admin-painel" id="painel-admin">
        <h3>🛠️ Menu do Dono</h3>
        <button id="adm-add-env">+ 50 Envelopes</button>
        <button id="adm-add-pts">+ 500 Pontos</button>
        <hr style="border-color: #444; margin: 12px 0;">
        <label style="font-size: 12px; color: #aaa; display: block; margin-bottom: 4px;">Injetar na Mão (ID):</label>
        <input type="number" id="adm-id-fig" placeholder="Ex: 500" min="1" max="1000">
        <button id="adm-btn-fig" class="btn-injeta">Injetar na Mão</button>
    </div>

    <button class="admin-btn-fixo" id="btn-admin-trigger">Administrador 🔑</button>

    <script src="script.js"></script>
</body>
</html>
